services:
  monolith.codes-postgres:
    image: postgres:latest
    restart: always
    environment:
      POSTGRES_DB: MonoDB
      POSTGRES_USER: Monolith
      # SECURED: Pulls from the .env file generated by GitHub Actions
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U Monolith -d MonoDB"]
      interval: 10s
      retries: 5
      
  monolith.codes-backend:
    image: ghcr.io/monolith-codes/monolith-backend:latest
    restart: always
    depends_on:
      monolith.codes-postgres:
        condition: service_healthy
    environment:
      # Use the "interpolation" syntax to ensure it's treated as a string
      - DATABASE_URL=postgresql://Monolith:${DB_PASSWORD}@monolith.codes-postgres:5432/MonoDB
    # Use the --schema flag explicitly to be safe
    command: >
      sh -c "npx prisma migrate deploy --schema ./prisma/schema.prisma && node dist/index.js"

  monolith.codes-frontend:
    # UPDATED: Matches the exact image name built by your GitHub Actions logs
    image: ghcr.io/monolith-codes/monolith-frontend:latest
    restart: always
    ports:
      # Exposes the frontend to the public internet on HTTP port 3198
      - "3198:3000"
    depends_on:
      - monolith.codes-postgres
      - monolith.codes-backend
    environment:
      # INTERNAL: Nuxt uses this to proxy browser requests securely to your hidden backend
      - NUXT_API_BASE=http://monolith.codes-backend:1909

volumes:
  pg_data:
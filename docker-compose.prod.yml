services:
  db:
    image: postgres:15-alpine
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend_net

  backend:
    # WICHTIG: Name muss zum GitHub Action Tag passen
    image: ghcr.io/<dein-nutzer>/<dein-repo>-backend:latest
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=${DATABASE_URL}
    networks:
      - backend_net
      - frontend_net

  frontend:
    # WICHTIG: Name muss zum GitHub Action Tag passen
    image: ghcr.io/<dein-nutzer>/<dein-repo>-frontend:latest
    restart: always
    depends_on:
      - backend
    environment:
      - NUXT_API_BASE=${NUXT_API_BASE}
    ports:
      - "3000:3000"
    networks:
      - frontend_net

volumes:
  pg_data:

networks:
  frontend_net:
  backend_net:
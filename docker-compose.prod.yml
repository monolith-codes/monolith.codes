services:
  monolith.codes-db:
    image: postgres:15-alpine # Use specific versions, not 'latest'
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend_net

  monolith.codes-backend:
    image: ghcr.io/monolith-codes/monolith-backend:latest
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
      # Add other app variables here
    networks:
      - backend_net
      - frontend_net

  monolith.codes-frontend:
    image: ghcr.io/monolith-codes/monolith-frontend:latest
    restart: always
    depends_on:
      - backend
    environment:
      - NUXT_API_BASE=http://backend:3000
      # Add other app variables here
    ports:
      - "3198:3000" # Exposes the frontend to the outside world
    networks:
      - frontend_net

volumes:
  pg_data:

networks:
  frontend_net:
  backend_net:




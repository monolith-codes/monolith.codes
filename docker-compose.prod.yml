services:
  monolith.codes-postgres:
    image: postgres:latest
    restart: always
    env_file:
      - .env
    volumes:
      - pg_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      retries: 5
      
  monolith.codes-backend:
    image: ghcr.io/monolith-codes/monolith-backend:latest
    restart: always
    depends_on:
      monolith.codes-postgres:
        condition: service_healthy
    env_file:
      - .env
    # 🚨 FIX: Chain the commands. Migrate FIRST, then start the server.
    command: >
      sh -c "npx prisma migrate deploy && node dist/index.js"

volumes:
  pg_data:
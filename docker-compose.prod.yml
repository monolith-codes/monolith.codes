services:
  monolith.codes-db:
    image: postgres:15-alpine # Use specific versions, not 'latest'
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  monolith.codes-backend:
    image: ghcr.io/monolith-codes/monolith-backend:latest
    restart: always
    depends_on:
      monolith.codes-db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
      # Add other app variables here
    ports:
      - "3000:3000"

  # monolith.codes-frontend:
  #   image: ghcr.io/monolith-codes/monolith-frontend:latest # Update with your actual frontend image
  #   restart: always
  #   depends_on:
  #     - monolith.codes-db
  #     - monolith.codes-backend
  #   environment:
  #     - NUXT_PUBLIC_API_BASE=http://monolith.codes-backend:3000 # Nuxt server-side URL variable
  #   ports:
  #     - "3198:3000"

volumes:
  pg_data: